<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cikon IoT Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">

    <!-- Header -->
    <header class="header">
      <div class="ident">
        <h1 id="dev-name">—</h1>
        <div class="ident-sub" id="dev-sub"></div>
      </div>
      <div class="header-actions">
        <span class="badge" id="status">
          <span class="dot"></span><span id="status-text">Offline</span>
        </span>
        <button class="btn-restart" id="btn-restart" title="Restart device">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"></path><path d="M13.5 2v3h-3"></path></svg>
          <span id="restart-label">Restart</span>
        </button>
        <button class="btn-icon" id="btn-theme" title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-main">
        <div class="hlabel">Uptime</div>
        <div class="hero-value" id="uptime">—</div>
        <div class="hero-foot" id="since">since —</div>
      </div>
      <div class="hero-side">
        <div class="hlabel">Free heap</div>
        <div class="hero-heap" id="free-heap">—</div>
        <div class="heap-bar"><span id="heap-fill"></span></div>
        <div class="hero-foot" id="min-heap">min seen —</div>
      </div>
    </section>

    <!-- Two columns -->
    <div class="cols">
      <section class="col">
        <div class="label section-label">Controls</div>
        <div class="card row" id="led-card">
          <div>
            <div class="row-title">Onboard LED</div>
            <div class="row-sub" id="led-sub">Off</div>
          </div>
          <button class="toggle" id="led-toggle" role="switch" aria-checked="false"><span class="knob"></span></button>
        </div>
      </section>

      <section class="col">
        <div class="label section-label">System</div>
        <div class="card list" id="sys-list"></div>
      </section>
    </div>

    <!-- FreeRTOS tasks (optional) -->
    <section class="tasks-section" id="tasks-section" hidden>
      <button class="card task-head" id="tasks-toggle">
        <span class="task-head-left">
          <span class="label">FreeRTOS tasks</span>
          <span class="count" id="task-count">0</span>
        </span>
        <span class="task-head-right"><span id="tasks-action">Show</span><span class="chevron" id="tasks-chevron">▾</span></span>
      </button>
      <div class="card task-table" id="task-table" hidden>
        <div class="task-row task-row-head">
          <button class="th th-name" data-sort="name">Task</button>
          <button class="th th-state" data-sort="state">State</button>
          <button class="th th-prio" data-sort="prio">Prio</button>
          <button class="th th-stack" data-sort="stack">Stack</button>
          <button class="th th-cpu" data-sort="cpu">CPU</button>
        </div>
        <div id="task-body"></div>
      </div>
    </section>

    <footer class="footer" id="footer"></footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
