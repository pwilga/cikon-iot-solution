<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cikon Systems IoT</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    [data-theme="dark"] {
      --bg: #12131f;
      --surface: #1a1c2e;
      --surface2: #22253a;
      --border: rgba(180, 180, 255, 0.1);
      --text: #dde1f5;
      --muted: #8a8fad;
      --shadow: rgba(0, 0, 0, 0.4);
      --hero-bg: #16192b;
    }

    [data-theme="light"] {
      --bg: #f5f4ff;
      --surface: #ffffff;
      --surface2: #ede9ff;
      --border: rgba(100, 90, 200, 0.12);
      --text: #1e1b3a;
      --muted: #8582a8;
      --shadow: rgba(80, 70, 160, 0.08);
      --hero-bg: #eeeaff;
    }

    :root {
      --a1: #a5c8f0;
      --a2: #b5a8f0;
      --a3: #f0b5d8;
      --green: #7dd8b0;
      --red: #f0a5a5;
      --r: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--hero-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(165, 200, 240, 0.35));
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .logo-tagline {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-mid {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .header-device {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--green);
    }

    .status-pill.offline {
      color: var(--red);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .offline .dot {
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    .theme-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .theme-btn:active {
      opacity: 0.7;
    }

    /* ── Metric strip ── */
    .metric-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 12px 20px;
      gap: 4px;
    }

    .mstrip-item {
      text-align: center;
    }

    .mstrip-val {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .mstrip-val.a {
      color: var(--a1);
    }

    .mstrip-val.g {
      color: var(--green);
    }

    .mstrip-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 20px;
    }

    .section-lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 18px;
    }

    .section-lbl:first-child {
      margin-top: 0;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      box-shadow: 0 1px 6px var(--shadow);
    }

    .card.wide {
      grid-column: 1 / -1;
    }

    .card-icon {
      font-size: 18px;
      margin-bottom: 8px;
      display: block;
    }

    .card-val {
      font-size: 17px;
      font-weight: 700;
      word-break: break-all;
      line-height: 1.2;
    }

    .card-val.a {
      color: var(--a1);
    }

    .card-val.g {
      color: var(--green);
    }

    .card-val.r {
      color: var(--red);
    }

    .card-val.mono {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .card-lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Object cards ── */
    .obj-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .obj-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      gap: 8px;
    }

    .obj-key {
      color: var(--muted);
      flex-shrink: 0;
    }

    .obj-val {
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text);
      text-align: right;
      word-break: break-all;
    }

    /* ── Tasks table ── */
    details>summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    details>summary::-webkit-details-marker {
      display: none;
    }

    .task-wrap {
      overflow-x: auto;
      margin-top: 10px;
    }

    .task-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .task-table th {
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 9px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .task-table td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .task-table tr:last-child td {
      border-bottom: none;
    }

    /* ── Footer ── */
    footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Desktop ── */
    @media (min-width: 600px) {

      header,
      .metric-strip,
      main,
      footer {
        max-width: 860px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
      }

      header,
      .metric-strip {
        max-width: 100%;
      }

      .cards {
        grid-template-columns: repeat(3, 1fr);
      }

      .card.wide {
        grid-column: auto;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-wrap">
      <svg class="logo-mark" width="36" height="36" viewBox="0 0 44 44" fill="none">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#a5c8f0" />
            <stop offset="100%" stop-color="#b5a8f0" />
          </linearGradient>
          <linearGradient id="lg2" x1="44" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0b5d8" />
            <stop offset="100%" stop-color="#a5c8f0" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.2" result="b" />
            <feMerge>
              <feMergeNode in="b" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <circle cx="22" cy="22" r="20" stroke="url(#lg1)" stroke-width="1" fill="none" opacity="0.35" />
        <path d="M22 6 A16 16 0 1 0 36.5 30" stroke="url(#lg1)" stroke-width="2.5" stroke-linecap="round" fill="none"
          filter="url(#glow)" />
        <circle cx="22" cy="6" r="2.5" fill="#a5c8f0" filter="url(#glow)" />
        <circle cx="6" cy="22" r="2.5" fill="#b5a8f0" filter="url(#glow)" />
        <circle cx="22" cy="38" r="2.5" fill="#f0b5d8" filter="url(#glow)" />
        <circle cx="36.5" cy="30" r="2.5" fill="#a5c8f0" filter="url(#glow)" />
        <circle cx="22" cy="22" r="3.5" fill="url(#lg2)" filter="url(#glow)" />
        <line x1="22" y1="9" x2="22" y2="19" stroke="url(#lg1)" stroke-width="1" opacity="0.4" />
        <line x1="9" y1="22" x2="19" y2="22" stroke="url(#lg1)" stroke-width="1" opacity="0.4" />
        <line x1="22" y1="25" x2="22" y2="35" stroke="url(#lg2)" stroke-width="1" opacity="0.4" />
        <line x1="34.5" y1="29" x2="25.5" y2="23.5" stroke="url(#lg1)" stroke-width="1" opacity="0.4" />
      </svg>
      <div>
        <div class="logo-name">Cikon Systems</div>
        <div class="logo-tagline">IoT Platform</div>
      </div>
    </div>

    <div class="header-mid">
      <div class="header-device" id="device-name">—</div>
      <div class="header-sub" id="device-chip">—</div>
    </div>

    <div class="header-right">
      <div class="status-pill" id="status-pill">
        <div class="dot"></div>
        <span id="status-text">—</span>
      </div>
      <button class="theme-btn" id="theme-btn" title="Toggle theme">
        <span id="theme-icon">☀️</span>
      </button>
    </div>
  </header>

  <div class="metric-strip">
    <div class="mstrip-item">
      <div class="mstrip-val a" id="ms-heap">—</div>
      <div class="mstrip-lbl">Free Heap</div>
    </div>
    <div class="mstrip-item">
      <div class="mstrip-val g" id="ms-uptime">—</div>
      <div class="mstrip-lbl">Uptime</div>
    </div>
    <div class="mstrip-item">
      <div class="mstrip-val" id="ms-chip">—</div>
      <div class="mstrip-lbl">Chip</div>
    </div>
  </div>

  <main>
    <div class="section-lbl">Telemetry</div>
    <div class="cards" id="tele-section"></div>
  </main>

  <footer>
    Cikon Systems &nbsp;·&nbsp; <span id="fw-info">—</span>
  </footer>

  <script>
    /* ── Theme ── */
    const html = document.documentElement;
    const themeIcon = document.getElementById('theme-icon');
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      themeIcon.textContent = t === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', t);
    }
    applyTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('theme-btn').addEventListener('click', () =>
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    /* ── Tele metadata ── */
    const SKIP = new Set(['uptime']);
    const LABELS = { startup: 'Last Boot', onboard_led: 'Onboard LED', temperature: 'Temperature', tasks_dict: 'Tasks', rollback: 'OTA Rollback', ip: 'IP Address', pwm_led: 'PWM LED', neopixel: 'Neopixel' };
    const ICONS = { startup: '🕐', onboard_led: '💡', temperature: '🌡', tasks_dict: '📋', rollback: '🔄', ip: '🌐', pwm_led: '💡', neopixel: '🌈', ds18b20: '🌡' };
    const UNITS = { temperature: '°C' };

    function label(k) { return LABELS[k] || k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }
    function icon(k) { return ICONS[k] || '📊'; }

    /* ── Formatters ── */
    function fmtHeap(b) { return (b / 1024).toFixed(0) + ' kB'; }

    function fmtUptime(s) {
      s = Math.floor(s);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60) % 60, h = Math.floor(s / 3600) % 24, d = Math.floor(s / 86400);
      if (d > 0) return d + 'd ' + h + 'h';
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm';
    }

    /* ── Card builders ── */
    function cardNum(k, v) {
      const u = UNITS[k] || '';
      const disp = Number.isInteger(v) ? v : v.toFixed(1);
      return `<span class="card-icon">${icon(k)}</span><div class="card-val">${disp}${u}</div><div class="card-lbl">${label(k)}</div>`;
    }

    function cardBool(k, v) {
      return `<span class="card-icon">${icon(k)}</span><div class="card-val ${v ? 'g' : ''}">${v ? 'ON' : 'OFF'}</div><div class="card-lbl">${label(k)}</div>`;
    }

    function cardStr(k, v) {
      if (k === 'rollback') {
        const ok = v === 'n/a';
        return `<span class="card-icon">${icon(k)}</span><div class="card-val ${ok ? 'g' : 'r'}">${ok ? 'OK' : v}</div><div class="card-lbl">${label(k)}</div>`;
      }
      return `<span class="card-icon">${icon(k)}</span><div class="card-val mono">${v || '—'}</div><div class="card-lbl">${label(k)}</div>`;
    }

    function cardTasks(k, v) {
      const n = Object.keys(v).length;
      const rows = Object.entries(v).map(([name, t]) =>
        `<tr><td>${name}</td><td>${t.state || '—'}</td><td>${t.prio ?? '—'}</td><td>${t.stack ?? '—'}</td></tr>`
      ).join('');
      return `<details><summary>
      <span class="card-icon" style="margin:0">${icon(k)}</span>
      <div class="card-val" style="font-size:15px">${n}</div>
      <div class="card-lbl">${label(k)}</div>
    </summary>
    <div class="task-wrap"><table class="task-table">
      <thead><tr><th>Task</th><th>State</th><th>Prio</th><th>Stack</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></details>`;
    }

    function cardObj(k, v) {
      const rows = Object.entries(v).map(([ek, ev]) =>
        `<div class="obj-row"><span class="obj-key">${ek}</span><span class="obj-val">${ev}</span></div>`
      ).join('');
      return `<span class="card-icon">${icon(k)}</span><div class="card-lbl">${label(k)}</div><div class="obj-list">${rows}</div>`;
    }

    function buildCard(k, v) {
      const el = document.createElement('div');
      let wide = false, inner = '';

      if (typeof v === 'number') {
        inner = cardNum(k, v);
      } else if (typeof v === 'boolean') {
        inner = cardBool(k, v);
      } else if (typeof v === 'string') {
        wide = true;
        inner = cardStr(k, v);
      } else if (v !== null && typeof v === 'object') {
        wide = true;
        inner = k === 'tasks_dict' ? cardTasks(k, v) : cardObj(k, v);
      }

      el.className = 'card' + (wide ? ' wide' : '');
      el.innerHTML = inner;
      return el;
    }

    /* ── Render ── */
    function renderTele(tele) {
      const sec = document.getElementById('tele-section');
      sec.innerHTML = '';
      for (const [k, v] of Object.entries(tele)) {
        if (SKIP.has(k)) continue;
        sec.appendChild(buildCard(k, v));
      }
    }

    function setOnline(ok) {
      const p = document.getElementById('status-pill');
      p.className = 'status-pill' + (ok ? '' : ' offline');
      document.getElementById('status-text').textContent = ok ? 'Online' : 'Offline';
    }

    /* ── Load ── */
    async function load() {
      try {
        const [info, tele] = await Promise.all([
          fetch('/info').then(r => r.json()),
          fetch('/tele').then(r => r.json()),
        ]);

        document.getElementById('device-name').textContent = info.app || '—';
        document.getElementById('device-chip').textContent = (info.chip || '—') + ' r' + (info.chip_rev || 0);
        document.getElementById('ms-heap').textContent = fmtHeap(info.free_heap);
        document.getElementById('ms-uptime').textContent = fmtUptime(info.uptime_s);
        document.getElementById('ms-chip').textContent = info.chip || '—';
        document.getElementById('fw-info').textContent = 'v' + info.version + ' · IDF ' + info.idf;

        setOnline(true);
        renderTele(tele);
      } catch (_) {
        setOnline(false);
      }
    }

    setInterval(load, 5000);
    load();
  </script>
</body>

</html>
