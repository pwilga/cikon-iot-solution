name: cikon_supervisor_adapters_esp_now_rx
version: "1.0.0"
description: "ESP-NOW RX adapter for supervisor"
license: MIT
url: https://github.com/pwilga/cikon-iot-solution
maintainers:
  - "Piotr Wilga <pwilga@gmail.com>"

dependencies:
  idf: ">=5.0"
  cikon_supervisor:
    git: "https://github.com/pwilga/cikon-iot-solution.git"
    path: components/cikon_supervisor
  cikon_helpers:
    git: "https://github.com/pwilga/cikon-iot-solution.git"
    path: components/cikon_helpers
  cikon_esp_now:
    git: "https://github.com/pwilga/cikon-iot-solution.git"
    path: components/cikon_esp_now
